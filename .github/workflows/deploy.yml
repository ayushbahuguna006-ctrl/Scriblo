name: Deploy to EC2
# //CI/CD pipeline
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          cat > key.pem << 'EOF'
          ${{ secrets.EC2_SSH_KEY }}
          EOF
          chmod 600 key.pem

      - name: Test SSH
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo SSH_OK"

      - name: Deploy on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            cd /home/${{ secrets.EC2_USER }}/Scriblo &&
            git fetch origin &&
            git reset --hard origin/main &&
            docker compose up -d --build
          "