version: "3.9"

services:
  backend:
    build: ./Backend
    container_name: scriblo-backend
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    restart: always

  frontend:
    build: ./Frontend
    container_name: scriblo-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always